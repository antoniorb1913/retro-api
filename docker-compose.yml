services:
  db:
    image: postgres:16
    container_name: retro_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER} 
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    ports:
      - "5435:5432"  # El de la izquierda es el de tu Windows
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s     # Cada cuánto tiempo comprueba si está vivo
      timeout: 5s      # Cuánto tiempo espera la respuesta antes de darla por mala
      retries: 5       # Cuántos intentos hace antes de decir que ha fallado
      start_period: 5s # Tiempo de cortesía al principio mientras arranca el motor

  api:
    build: .
    container_name: retro_api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db 
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: